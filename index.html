<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e1726" />
    <title>Tomo Island</title>
    <style>
      :root {
        --bg-deep: #0e1726;
        --bg-mid: #1c2c44;
        --ink: #e9f1ff;
        --accent: #ffd166;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg-deep);
        color: var(--ink);
        font-family: 'Trebuchet MS', system-ui, sans-serif;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 30%, #233a5c 0%, #0e1726 70%);
      }
      #canvas-host {
        position: relative;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
      }
      #canvas-host canvas {
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        image-rendering: crisp-edges;
        box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        background: #000;
        max-width: 100vw;
        max-height: 100vh;
      }
      #ui {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      #ui > * { pointer-events: auto; }
      .boot {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--bg-deep);
        z-index: 50;
        text-align: center;
      }
      .boot h1 {
        font-size: clamp(28px, 5vw, 56px);
        margin: 0 0 8px;
        letter-spacing: 0.04em;
        color: var(--accent);
        text-shadow: 0 2px 0 #b88a2a;
      }
      .boot p { opacity: 0.75; max-width: 520px; line-height: 1.5; }
      .boot.hidden { display: none; }
      .progress {
        width: 320px;
        height: 12px;
        border-radius: 6px;
        background: #11203a;
        overflow: hidden;
        margin: 16px auto;
        border: 1px solid #2a4060;
      }
      .progress > div {
        height: 100%;
        background: linear-gradient(90deg, #ffd166, #ff8a5b);
        width: 0%;
        transition: width 0.2s ease;
      }
      button {
        cursor: pointer;
        font: inherit;
        background: var(--accent);
        color: #2a1d00;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        font-weight: 700;
        letter-spacing: 0.02em;
        box-shadow: 0 2px 0 #b88a2a;
        transition: transform 0.05s;
      }
      button:hover { filter: brightness(1.05); }
      button:active { transform: translateY(1px); box-shadow: 0 1px 0 #b88a2a; }
      button.secondary {
        background: #2a4060;
        color: var(--ink);
        box-shadow: 0 2px 0 #1a2840;
      }

      /* ================= HUD ================= */
      .hud {
        position: absolute;
        inset: 0;
        pointer-events: none;
        font-family: inherit;
      }
      .hud > * { pointer-events: auto; }
      .hud-top {
        position: absolute;
        top: 0; left: 0; right: 0;
        padding: 10px 14px;
        display: flex; justify-content: space-between; align-items: center;
        background: linear-gradient(to bottom, rgba(14,23,38,0.85), rgba(14,23,38,0));
        color: var(--ink);
      }
      .hud-clock { font-weight: 700; letter-spacing: 0.04em; }
      .hud-bottom {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 10px 14px;
        display: flex; gap: 12px; align-items: center; justify-content: space-between;
        background: linear-gradient(to top, rgba(14,23,38,0.9), rgba(14,23,38,0));
      }
      .hud-nav, .hud-actions { display: flex; gap: 6px; flex-wrap: wrap; }
      .hud-nav button, .hud-actions button {
        font-size: 14px;
        padding: 8px 12px;
        opacity: 0.85;
      }
      .hud-nav button.active {
        opacity: 1;
        outline: 2px solid #fff3;
        outline-offset: -1px;
      }
      .hud-selected {
        position: absolute;
        right: 12px;
        top: 56px;
        width: 260px;
        background: rgba(14,23,38,0.92);
        border: 1px solid #2a4060;
        border-radius: 12px;
        padding: 12px;
        color: var(--ink);
        box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      }
      .hud-selected-head {
        display: flex; justify-content: space-between; align-items: center; gap: 6px;
        margin-bottom: 8px;
      }
      .hud-selected-head .mood { opacity: 0.7; font-size: 12px; }
      .hud-selected-head button { padding: 4px 8px; font-size: 12px; }
      .need-row {
        display: grid;
        grid-template-columns: 80px 1fr 56px;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        margin-bottom: 4px;
      }
      .need-bar {
        background: #1a2840;
        height: 8px;
        border-radius: 4px;
        overflow: hidden;
      }
      .need-fill {
        height: 100%;
        background: #ffd166;
        transition: width 0.2s ease;
      }
      .need-val { opacity: 0.6; font-variant-numeric: tabular-nums; }
      .hud-selected-actions {
        display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
      }
      .hud-selected-actions button { font-size: 12px; padding: 6px 10px; }

      /* ================= Speech bubbles ================= */
      .bubble {
        position: absolute;
        background: #fffaf0;
        color: #1c1c1c;
        border: 2px solid #1c1c1c;
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 13px;
        font-family: 'Trebuchet MS', sans-serif;
        max-width: 220px;
        min-width: 60px;
        text-align: center;
        box-shadow: 0 3px 0 rgba(0,0,0,0.18);
        pointer-events: none;
        z-index: 20;
        line-height: 1.25;
      }
      .bubble::after {
        content: "";
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 0; height: 0;
        border: 8px solid transparent;
        border-top-color: #fffaf0;
        border-bottom: 0;
        margin-bottom: -2px;
        filter: drop-shadow(0 2px 0 #1c1c1c);
      }
      .bubble-llm {
        background: #fff3c4;
        border-color: #5a3a1a;
      }
      .bubble-llm::after { border-top-color: #fff3c4; }

      /* ================= Title ================= */
      .title {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 30%, #1c2c44 0%, #0e1726 70%);
        display: grid;
        place-items: center;
        z-index: 100;
      }
      .title-wrap {
        text-align: center;
        color: var(--ink);
        padding: 24px;
      }
      .title-wrap h1 {
        font-size: clamp(48px, 8vw, 96px);
        color: var(--accent);
        text-shadow: 0 4px 0 #b88a2a, 0 0 32px rgba(255, 209, 102, 0.3);
        margin: 0 0 8px;
        letter-spacing: 0.04em;
      }
      .title-sub { opacity: 0.7; max-width: 480px; margin: 0 auto 24px; }
      .title-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
      .title-buttons button { font-size: 18px; padding: 12px 22px; }
      .title-foot { margin-top: 24px; font-size: 11px; opacity: 0.4; }

      /* ================= Editor ================= */
      .editor {
        position: absolute;
        inset: 0;
        background: rgba(14,23,38,0.96);
        display: grid;
        place-items: stretch;
        z-index: 90;
        color: var(--ink);
        overflow: auto;
      }
      .editor-wrap {
        display: flex; flex-direction: column;
        height: 100%;
        max-width: 1100px;
        margin: 0 auto;
        width: 100%;
      }
      .editor-head {
        display: flex; justify-content: space-between; align-items: center;
        padding: 12px 20px;
        border-bottom: 1px solid #2a4060;
      }
      .editor-head h2 { margin: 0; color: var(--accent); }
      .editor-body {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 16px;
        min-height: 0;
      }
      @media (max-width: 720px) {
        .editor-body { grid-template-columns: 1fr; }
      }
      .editor-preview {
        background: #fde7d3;
        border-radius: 8px;
        display: grid; place-items: center;
        position: relative;
        min-height: 320px;
        overflow: hidden;
      }
      .editor-preview canvas { max-width: 100%; max-height: 100%; }
      .editor-controls {
        display: flex; flex-direction: column; gap: 10px;
        overflow-y: auto;
        padding-right: 4px;
      }
      .row { display: flex; align-items: center; gap: 10px; }
      .row label {
        min-width: 100px;
        font-size: 12px;
        opacity: 0.8;
      }
      .row input[type="text"] {
        flex: 1;
        font: inherit;
        background: #1c2c44;
        color: var(--ink);
        border: 1px solid #2a4060;
        border-radius: 6px;
        padding: 6px 10px;
      }
      .part-picker, .color-picker {
        display: flex; flex-wrap: wrap; gap: 4px;
      }
      .part-picker button {
        width: 32px; height: 32px;
        padding: 0;
        font-size: 11px;
        background: #2a4060;
        color: var(--ink);
        box-shadow: 0 2px 0 #1a2840;
      }
      .part-picker button.active {
        background: var(--accent);
        color: #2a1d00;
        box-shadow: 0 2px 0 #b88a2a;
      }
      .color-picker button {
        width: 28px; height: 28px;
        padding: 0;
        border-radius: 50%;
        box-shadow: 0 0 0 2px #1a2840;
        border: 2px solid transparent;
      }
      .color-picker button.active {
        border-color: var(--accent);
        transform: scale(1.1);
      }
      .editor-actions {
        margin-top: auto;
        display: flex; gap: 8px;
        padding-top: 12px;
        border-top: 1px solid #2a4060;
      }
      .editor-actions button { font-size: 16px; padding: 10px 18px; }

      /* ================= Dialogue panel ================= */
      .dialogue-panel {
        position: absolute;
        left: 12px; right: 12px; bottom: 70px;
        max-width: 520px;
        margin: 0 auto;
        background: rgba(14,23,38,0.95);
        color: var(--ink);
        border: 1px solid #2a4060;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        display: flex; flex-direction: column;
        gap: 8px;
        max-height: 60vh;
        z-index: 60;
      }
      .dialogue-header {
        display: flex; align-items: center; gap: 8px;
      }
      .dialogue-header strong { color: var(--accent); }
      .dialogue-mood { opacity: 0.6; font-size: 12px; flex: 1; }
      .dialogue-header button { padding: 4px 8px; font-size: 12px; }
      .dialogue-history {
        flex: 1;
        overflow-y: auto;
        display: flex; flex-direction: column; gap: 6px;
        padding: 4px 0;
      }
      .dialogue-turn {
        padding: 6px 8px;
        border-radius: 8px;
        max-width: 90%;
        font-size: 14px;
        line-height: 1.35;
      }
      .dialogue-turn.user {
        background: #2a4060;
        align-self: flex-end;
      }
      .dialogue-turn.model {
        background: #3a2a1a;
        align-self: flex-start;
      }
      .dialogue-turn .who { font-size: 10px; opacity: 0.7; margin-bottom: 2px; }
      .dialogue-input-row {
        display: flex; gap: 6px;
      }
      .dialogue-input-row input {
        flex: 1;
        font: inherit;
        background: #1c2c44;
        color: var(--ink);
        border: 1px solid #2a4060;
        border-radius: 6px;
        padding: 8px 10px;
      }
      .dialogue-input-row button { padding: 6px 12px; font-size: 13px; }

      /* ================= Tomodachi info panel ================= */
      .tomo-info {
        position: absolute;
        left: 12px; top: 56px; bottom: 70px;
        width: 320px;
        background: rgba(14,23,38,0.96);
        color: var(--ink);
        border: 1px solid #2a4060;
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        display: flex; flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        z-index: 70;
        font-size: 13px;
      }
      .tomo-info-wrap { display: flex; flex-direction: column; gap: 10px; }
      .tomo-info-head {
        display: flex; align-items: center; gap: 8px;
      }
      .tomo-info-head h2 { margin: 0; color: var(--accent); font-size: 18px; flex: 1; }
      .tomo-info-head .tomo-arch {
        font-size: 11px;
        padding: 2px 8px;
        background: #2a4060;
        border-radius: 8px;
        color: var(--ink);
      }
      .tomo-info-head button { padding: 4px 8px; font-size: 12px; }
      .tomo-info-status { display: flex; flex-wrap: wrap; gap: 4px; }
      .tomo-info-status .pill {
        font-size: 11px;
        padding: 2px 8px;
        background: #1c2c44;
        border: 1px solid #2a4060;
        border-radius: 8px;
        color: var(--ink);
      }
      .tomo-info-needs { display: flex; flex-direction: column; gap: 4px; }
      .tomo-info-section {
        background: #11203a;
        border: 1px solid #2a4060;
        border-radius: 8px;
        padding: 8px 10px;
      }
      .tomo-info-section h3 {
        margin: 0 0 6px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--accent);
        opacity: 0.85;
      }
      .tomo-info-section .muted { opacity: 0.55; font-size: 12px; margin: 4px 0 0; }
      .tomo-wish-title { font-size: 16px; font-weight: 700; color: var(--accent); }
      .tomo-wish-hints { margin: 6px 0 0; padding-left: 20px; font-size: 12px; }
      .tomo-wish-hints li { margin-bottom: 2px; line-height: 1.4; }
      .tomo-wish-hints li.revealed { opacity: 0.95; }
      .tomo-wish-hints li.locked { opacity: 0.35; }
      .tomo-wish-fulfilled {
        margin: 8px 0 0;
        padding: 6px 8px;
        background: rgba(255,209,102,0.12);
        border: 1px solid var(--accent);
        border-radius: 6px;
        font-size: 12px;
        color: var(--accent);
      }
      .tomo-friends-list, .tomo-memory-list {
        list-style: none; padding: 0; margin: 0;
        display: flex; flex-direction: column; gap: 4px;
        font-size: 12px;
      }
      .tomo-friends-list li {
        display: grid;
        grid-template-columns: 80px 1fr 32px;
        align-items: center;
        gap: 6px;
      }
      .friend-bar { background: #1a2840; height: 6px; border-radius: 3px; overflow: hidden; }
      .friend-fill { height: 100%; background: linear-gradient(90deg, #ffd166, #ff8a5b); }
      .friend-score { font-size: 11px; opacity: 0.6; text-align: right; font-variant-numeric: tabular-nums; }
      .tomo-memory-list li { opacity: 0.85; line-height: 1.4; }
      .tomo-info-actions {
        display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
      }
      .tomo-info-actions button { font-size: 12px; padding: 6px 10px; }
      .tomo-info-send {
        display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
        font-size: 11px;
      }
      .tomo-info-send .muted { margin-right: 4px; }
      .tomo-info-send button { font-size: 11px; padding: 4px 8px; }
      .tomo-info-send button.active { outline: 2px solid var(--accent); outline-offset: -1px; }

    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-host"></div>
      <div id="ui"></div>
    </div>
    <div id="boot" class="boot">
      <div>
        <h1>TOMO ISLAND</h1>
        <p>Waking up the island…</p>
        <div class="progress"><div id="boot-progress"></div></div>
        <p id="boot-status" style="font-size: 12px; opacity: 0.6;">Boot</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
